name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  scan-secrets:
    name: Scan for committed secrets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION=8.18.4
          curl -fsSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar xz gitleaks
          sudo mv gitleaks /usr/local/bin/
          gitleaks version

      - name: Scan working tree
        run: gitleaks detect --source . --no-banner --verbose

  lint-docs:
    name: Lint markdown
    runs-on: ubuntu-latest
    env:
      MARKDOWNLINT_CLI2_VERSION: 0.22.1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install markdownlint-cli2 (pinned)
        run: npm install -g "markdownlint-cli2@${MARKDOWNLINT_CLI2_VERSION}"

      - name: Run markdownlint-cli2
        run: markdownlint-cli2 "**/*.md"

  lint-python:
    name: Lint and type-check Python (orchestrator)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: orchestrator
    env:
      UV_VERSION: 0.11.14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv (pinned)
        uses: astral-sh/setup-uv@v6
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true

      - name: Install Python toolchain (from .python-version)
        run: uv python install

      - name: Install dependencies (frozen lockfile)
        run: uv sync --frozen --no-install-project

      - name: Install project (editable)
        run: uv sync --frozen

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Mypy
        run: uv run mypy src

      - name: Pytest
        run: uv run pytest

  lint-go:
    name: Build and test Go (service)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: service/go.mod
          cache: true
          cache-dependency-path: service/go.sum

      - name: Verify module is tidy
        run: |
          go mod tidy
          if [ -n "$(git status --porcelain go.mod go.sum)" ]; then
            echo "go.mod or go.sum out of date; run 'go mod tidy' locally and commit"
            git diff go.mod go.sum
            exit 1
          fi

      - name: Build
        run: go build ./...

      - name: Format check
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "files need formatting:"
            echo "$unformatted"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race ./...

  lint-infra:
    name: Lint Terraform (infra)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra
    env:
      TERRAFORM_VERSION: 1.15.3
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform (pinned)
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Format check
        run: terraform fmt -check -recursive

      - name: Init (no backend)
        run: terraform init -backend=false

      - name: Validate
        run: terraform validate

  publish-artifact:
    name: Publish release tarball to S3
    needs: [scan-secrets, lint-docs, lint-python, lint-go, lint-infra]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    env:
      AWS_REGION: us-east-1
      ARTIFACT_BUCKET: filingsradar-artifacts
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: service/go.mod
          cache: true
          cache-dependency-path: service/go.sum

      - name: Build arm64 binary
        working-directory: service
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 \
            go build -trimpath -ldflags="-s -w" \
            -o /tmp/filings-server ./cmd/filings-server
          file /tmp/filings-server

      - name: Stage orchestrator tree for packaging
        run: |
          mkdir -p /tmp/release/orchestrator
          # Copy only what the host needs at runtime — source, pyproject,
          # lockfile, and SQL migrations. Tests, caches, and editor files
          # stay out of the tarball.
          rsync -a \
            --include='pyproject.toml' \
            --include='uv.lock' \
            --include='README.md' \
            --include='src/' \
            --include='src/**' \
            --include='db/' \
            --include='db/migrations/' \
            --include='db/migrations/**' \
            --exclude='*' \
            orchestrator/ /tmp/release/orchestrator/
          mv /tmp/filings-server /tmp/release/filings-server

      - name: Package release tarball
        run: |
          tar -czf /tmp/release.tar.gz -C /tmp/release .
          ls -l /tmp/release.tar.gz
          tar -tzf /tmp/release.tar.gz | head -20

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/filings-watcher-github-build
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload release to S3
        run: |
          aws s3 cp /tmp/release.tar.gz \
            "s3://${ARTIFACT_BUCKET}/releases/${{ github.sha }}/release.tar.gz"

      - name: Workflow summary
        run: |
          {
            echo "### Release published"
            echo ""
            echo "- SHA: \`${{ github.sha }}\`"
            echo "- Object: \`s3://${ARTIFACT_BUCKET}/releases/${{ github.sha }}/release.tar.gz\`"
            echo ""
            echo "Deploy this build by running the **Deploy** workflow with \`sha=${{ github.sha }}\`."
          } >> "$GITHUB_STEP_SUMMARY"
